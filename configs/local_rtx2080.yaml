model:
  n_layers: 6
  n_heads: 6
  d_model: 384
  d_ff: 1536
  max_seq_len: 256
  vocab_size: 50257
  dropout: 0.1
  use_rms_norm: true
  weight_tying: true

training:
  batch_size: 30
  grad_accumulation_steps: 4
  learning_rate: 3.0e-4
  warmup_steps: 500
  max_grad_norm: 1.0
  time_limit_seconds: 3600
  val_every_steps: 500
  val_warmup_steps: 100
  save_every_steps: 500
  log_every_steps: 10
  seed: 42

gpu:
  auto_tune_batch_size: false
  empty_cache_every_n_steps: 100
  memory_log_every_n_steps: 200
  use_torch_compile: false
  use_fused_adamw: true

data:
  dataset_name: "roneneldan/TinyStories"
  chunk_size: 256
  num_workers: 4
  prefetch_factor: 4
  tokenizer_cache_dir: "data/tokenizer"
  tensor_cache_dir: "data/cache"
  val_continuation_n_stories: 500

inference:
  default_kv_mode: "full"
  default_window_size: 256
  temperature: 0.8
  top_k: 50
  top_p: 0.95
  max_new_tokens: 200
